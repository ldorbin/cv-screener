[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Give scoring/parse endpoints headroom for PDF parsing + Claude round-trips
  node_bundler = "esbuild"

[functions."api/score"]
  timeout = 60

[functions."api/score/batch"]
  timeout = 120

[functions."api/parse"]
  timeout = 30
