[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Give scoring/parse endpoints headroom for PDF parsing + Claude round-trips
  node_bundler = "esbuild"
  # Default timeout for all functions (covers whatever the Next.js plugin names
  # its unified handler in the version deployed here)
  timeout = 60

[functions."api/score"]
  timeout = 60

[functions."api/score/batch"]
  timeout = 120

[functions."api/parse"]
  timeout = 30

[functions."api/brief"]
  timeout = 30

[functions."api/demo"]
  timeout = 60

# Unified handler names used by different @netlify/plugin-nextjs versions
[functions."___netlify-handler"]
  timeout = 60

[functions."___netlify-server-handler"]
  timeout = 60
